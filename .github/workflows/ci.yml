name: Backend CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-key-minimum-16
          SESSION_SECRET: test-session-secret-key-minimum-16
        run: npm test

      - name: Generate coverage
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-key-minimum-16
          SESSION_SECRET: test-session-secret-key-minimum-16
        run: npm run test:coverage

      - name: Check OpenAPI snapshot is up to date
        run: npm run openapi:check

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Upload OpenAPI snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-snapshot
          path: openapi/openapi.json
