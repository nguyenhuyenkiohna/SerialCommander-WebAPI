# Mosquitto production — WSS :8884 (Serial Commander remote session)
# Mount: ./config/mosquitto.conf → /mosquitto/config/mosquitto.conf

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type error
log_type warning
log_type notice

allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# Plain MQTT — chỉ localhost (debug nội bộ VPS)
listener 1883
protocol mqtt
bind_address 127.0.0.1

# TLS WebSocket — browser (VITE_MQTT_BROKER_URL=wss://mqtt.toolhub.app:8884/mqtt)
listener 8884
protocol websockets
cafile /mosquitto/certs/fullchain.pem
certfile /mosquitto/certs/fullchain.pem
keyfile /mosquitto/certs/privkey.pem
tls_version tlsv1.2
